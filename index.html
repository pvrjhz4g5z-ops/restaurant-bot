<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Бронювання</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg2: #fdf7f2;
  --text: #1a0e00;
  --text2: #8a6040;
  --orange: #e07020;
  --orange-dark: #b85510;
  --orange-light: #fff3e6;
  --border: #f0d0b0;
}

html, body {
  height: 100%;
  background: #ffffff;
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  overflow-x: hidden;
}

#landing {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  background: #ffffff;
}

.landing-card {
  width: 100%;
  max-width: 360px;
  aspect-ratio: 3/4;
  background: linear-gradient(160deg, #e07020 0%, #b85510 100%);
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 40px 32px;
  position: relative;
  overflow: hidden;
}
.landing-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(255,255,255,0.1) 0%, transparent 65%);
  pointer-events: none;
}
.landing-logo { position: absolute; top: 40px; left: 0; right: 0; text-align: center; }
.landing-logo-mark { width: 36px; height: 1px; background: rgba(255,255,255,0.4); margin: 0 auto 16px; }
.landing-name { font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(255,255,255,0.65); }
.landing-tagline { font-size: 27px; font-weight: 300; letter-spacing: -0.02em; color: #fff; text-align: center; line-height: 1.3; margin-bottom: 36px; }
.btn-book { width: 100%; padding: 15px; background: #fff; color: var(--orange-dark); border: none; border-radius: 12px; font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
.btn-book:active { opacity: 0.85; }

#floorpage { display: none; min-height: 100vh; background: #ffffff; }

.floor-header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1.5px solid var(--border); background: #ffffff; position: sticky; top: 0; z-index: 5; }
.back-btn { background: none; border: none; color: var(--orange); font-size: 13px; cursor: pointer; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.floor-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text2); }

.floor-wrap { padding: 12px; }

.tap-hint {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 4px 12px 12px;
  padding: 11px 16px;
  background: var(--orange-light);
  border: 1.5px solid var(--orange);
  border-radius: 12px;
  font-size: 13px;
  color: var(--orange-dark);
  font-weight: 500;
}
.tap-hint .hint-finger {
  font-size: 16px;
  animation: tapBounce 1.4s ease-in-out infinite;
}
@keyframes tapBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.tbl.pulse .tbl-rect {
  animation: tblPulse 1.6s ease-in-out infinite;
}
@keyframes tblPulse {
  0%, 100% { stroke-width: 1.5; fill: #edf5ec; }
  50% { stroke-width: 3; fill: #d4ecd0; }
}
.floor-svg { width: 100%; height: auto; display: block; }

.legend { display: flex; gap: 16px; padding: 0 12px 16px; justify-content: center; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; }

#modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(26,14,0,0.35); backdrop-filter: blur(4px); align-items: flex-end; justify-content: center; }
#modal.open { display: flex; }

.modal-sheet { width: 100%; max-width: 480px; background: #ffffff; border-radius: 24px 24px 0 0; border-top: 2px solid var(--orange); max-height: 92vh; overflow-y: auto; overflow-x: hidden; touch-action: pan-y; position: relative; padding: 12px 24px 44px; }

.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-close { position: absolute; top: 14px; right: 20px; width: 32px; height: 32px; border-radius: 50%; background: var(--bg2); border: 1px solid var(--border); color: var(--text2); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.modal-close:hover { background: var(--orange-light); color: var(--orange); border-color: var(--orange); }

.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 3px; color: var(--orange-dark); }
.modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 22px; }

.field { margin-bottom: 13px; }
.field label { display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); margin-bottom: 7px; font-weight: 500; }
.field input { width: 100%; padding: 12px 14px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s; }
.field input:focus { border-color: var(--orange); }

.time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 18px; }
.time-btn { padding: 9px 4px; text-align: center; font-size: 12px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; transition: all 0.15s; }
.time-btn.sel { background: var(--orange-light); border-color: var(--orange); color: var(--orange-dark); font-weight: 600; }
.time-btn.taken { opacity: 0.35; cursor: not-allowed; text-decoration: line-through; background: #fdecea; border-color: #c0392b; color: #c0392b; }

.guests-row { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.guests-row label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); flex: 1; font-weight: 500; }
.g-btn { width: 32px; height: 32px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 50%; color: var(--orange); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.g-val { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; color: var(--orange-dark); }

.divider { height: 1px; background: var(--border); margin: 18px 0; }

.phone-wrap { position: relative; display: flex; align-items: center; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 10px; overflow: visible; }
.phone-wrap:focus-within { border-color: var(--orange); }
.phone-country { display: flex; align-items: center; gap: 4px; padding: 12px 10px 12px 14px; cursor: pointer; border-right: 1.5px solid var(--border); white-space: nowrap; user-select: none; flex-shrink: 0; }
#country-code { font-size: 14px; color: var(--text); }
.phone-arrow { font-size: 10px; color: var(--text2); }
.phone-wrap input[type=tel] { flex: 1; padding: 12px 14px; background: transparent; border: none; color: var(--text); font-size: 15px; outline: none; width: 100%; }
.country-menu { display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: #fff; border: 1.5px solid var(--border); border-radius: 10px; z-index: 200; overflow: hidden; box-shadow: 0 8px 24px rgba(26,14,0,0.12); }
.country-menu.open { display: block; }
.country-search-wrap { padding: 10px; border-bottom: 1px solid var(--border); }
.country-search-wrap input { width: 100%; padding: 8px 12px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; }
.country-list { max-height: 200px; overflow-y: auto; }
.country-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; font-size: 13px; color: var(--text); }
.country-item:hover { background: var(--orange-light); }
.country-item .c-code { color: var(--text2); margin-left: auto; font-size: 12px; }

.btn-confirm { width: 100%; padding: 15px; background: var(--orange); color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
.btn-confirm:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-confirm:active:not(:disabled) { opacity: 0.85; }

#successpage { display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; background: #ffffff; }
#successpage.open { display: flex; }
.success-card { text-align: center; max-width: 300px; }
.success-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--orange-light); margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.success-title { font-size: 22px; font-weight: 600; color: var(--orange-dark); margin-bottom: 8px; }
.success-sub { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 32px; }
.success-detail { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.success-detail span:first-child { color: var(--text2); }
.success-detail span:last-child { font-weight: 500; color: var(--orange-dark); }

/* Столики */
.tbl { cursor: pointer; }
.tbl .tbl-rect { fill: #edf5ec; stroke: #5a9e52; stroke-width: 1.5; transition: all 0.15s; }
.tbl .tbl-num { fill: #3a7a34; }
.tbl .tbl-action { fill: #3a7a34; }
.tbl .tbl-seats { fill: #7ab874; }
.tbl:active .tbl-rect { opacity: 0.8; }
.tbl.booked { cursor: not-allowed; }
.tbl.booked .tbl-rect { fill: #fdecea; stroke: #c0392b; }
.tbl.booked .tbl-num { fill: #c0392b; }
.tbl.booked .tbl-action { fill: #c0392b; }
.tbl.booked .tbl-seats { fill: #e0a0a0; }

/* Barні крісла — клікабельні */
.bar-stool { cursor: pointer; }
.bar-stool .stool-circle { fill: #d4ecd0; stroke: #5a9e52; stroke-width: 1.5; transition: all 0.15s; }
.bar-stool .stool-num { fill: #3a7a34; }
.bar-stool:active .stool-circle { opacity: 0.8; }
.bar-stool.booked { cursor: not-allowed; }
.bar-stool.booked .stool-circle { fill: #fadbd8; stroke: #c0392b; }
.bar-stool.booked .stool-num { fill: #c0392b; }
</style>
</head>
<body>

  <div class="landing-card">
    <div class="landing-logo">

      <label>Гостей</label>
      <button class="g-btn" onclick="changeGuests(-1)">−</button>

      <button class="g-btn" onclick="changeGuests(1)">+</button>

      <label>Телефон</label>
      <div class="phone-wrap">
        <div class="phone-country" onclick="toggleCountryMenu()">
          <span id="country-flag">🇺🇦</span>
          <span id="country-code">+380</span>
          <span class="phone-arrow">▾</span>

        <input type="tel" id="f-phone" placeholder="50 375 76 78" oninput="formatPhone(this); checkForm()">

          <div class="country-search-wrap"><input type="text" id="country-search" placeholder="Пошук..." oninput="filterCountries()"></div>

        </div>
      </div>

  </div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#ffffff'); tg.setBackgroundColor('#ffffff'); }

const TIMES = ['12:00','12:30','13:00','13:30','14:00','14:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30'];
const API_BASE = 'https://web-production-aff79.up.railway.app';
const state = { tableId: null, tableName: '', tableSeats: 0, date: '', time: '', guests: 2 };

const COUNTRIES = [
  { name: 'Україна', flag: '🇺🇦', code: '+380' },
  { name: 'Польща', flag: '🇵🇱', code: '+48' },
  { name: 'Німеччина', flag: '🇩🇪', code: '+49' },
  { name: 'США', flag: '🇺🇸', code: '+1' },
  { name: 'Велика Британія', flag: '🇬🇧', code: '+44' },
  { name: 'Франція', flag: '🇫🇷', code: '+33' },
  { name: 'Італія', flag: '🇮🇹', code: '+39' },
  { name: 'Іспанія', flag: '🇪🇸', code: '+34' },
  { name: 'Чехія', flag: '🇨🇿', code: '+420' },
  { name: 'Австрія', flag: '🇦🇹', code: '+43' },
  { name: 'Румунія', flag: '🇷🇴', code: '+40' },
  { name: 'Угорщина', flag: '🇭🇺', code: '+36' },
  { name: 'Молдова', flag: '🇲🇩', code: '+373' },
  { name: 'Туреччина', flag: '🇹🇷', code: '+90' },
  { name: 'ОАЕ', flag: '🇦🇪', code: '+971' },
  { name: 'Ізраїль', flag: '🇮🇱', code: '+972' },
  { name: 'Австралія', flag: '🇦🇺', code: '+61' },
  { name: 'Нідерланди', flag: '🇳🇱', code: '+31' },
];
let selectedCountry = COUNTRIES[0];

function renderCountries(list) {
  document.getElementById('country-list').innerHTML = list.map(c => `
    <div class="country-item" onclick="selectCountryItem(${COUNTRIES.indexOf(c)})">
      <span>${c.flag}</span><span>${c.name}</span><span class="c-code">${c.code}</span>
    </div>`).join('');
}
function filterCountries() {
  const q = document.getElementById('country-search').value.toLowerCase();
  renderCountries(COUNTRIES.filter(c => c.name.toLowerCase().includes(q) || c.code.includes(q)));
}
function toggleCountryMenu() {
  const menu = document.getElementById('country-menu');
  menu.classList.toggle('open');
  if (menu.classList.contains('open')) {
    renderCountries(COUNTRIES);
    document.getElementById('country-search').value = '';
    setTimeout(() => document.getElementById('country-search').focus(), 50);
  }
}
function selectCountryItem(idx) {
  selectedCountry = COUNTRIES[idx];
  document.getElementById('country-flag').textContent = selectedCountry.flag;
  document.getElementById('country-code').textContent = selectedCountry.code;
  document.getElementById('country-menu').classList.remove('open');
  document.getElementById('f-phone').focus();
  checkForm();
}
document.addEventListener('click', e => {
  if (!e.target.closest('.phone-wrap')) {
    const m = document.getElementById('country-menu');
    if (m) m.classList.remove('open');
  }
});

function formatPhone(input) {
  let v = input.value.replace(/\D/g, '');
  if (v.startsWith('0')) v = v.slice(1);
  if (v.length > 9) v = v.slice(0, 9);
  let f = '';
  if (v.length > 0) f = v.slice(0, 2);
  if (v.length > 2) f += ' ' + v.slice(2, 5);
  if (v.length > 5) f += ' ' + v.slice(5, 7);
  if (v.length > 7) f += ' ' + v.slice(7, 9);
  input.value = f;
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

// При фокусі на полі — м'яко проскролити до нього (не фіксуючи)
document.querySelectorAll('.modal-sheet input').forEach(inp => {
  inp.addEventListener('focus', () => {
    setTimeout(() => {
      inp.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  });
});

async function loadTableStatuses(date) {
  try {
    const res = await fetch(`${API_BASE}/api/tables?date=${date}`);
    if (!res.ok) { applyPulse(); return; }
    const data = await res.json();
    const booked = data.booked_tables || [];
    document.querySelectorAll('.tbl').forEach(g => {
      const name = g.dataset.name;
      if (booked.includes(name)) {
        g.classList.add('booked');
        g.querySelector('.tbl-action').textContent = 'Заброньовано';
      } else {
        g.classList.remove('booked');
        g.querySelector('.tbl-action').textContent = 'Забронювати';
      }
    });
    document.querySelectorAll('.bar-stool').forEach(g => {
      const name = g.dataset.name;
      if (booked.includes(name)) g.classList.add('booked');
      else g.classList.remove('booked');
    });
    applyPulse();
  } catch(e) { applyPulse(); }
}

function applyPulse() {
  document.querySelectorAll('.tbl').forEach(t => t.classList.remove('pulse'));
  const firstFree = document.querySelector('.tbl:not(.booked)');
  if (firstFree) {
    firstFree.classList.add('pulse');
    setTimeout(() => firstFree.classList.remove('pulse'), 5000);
  }
}

function showFloor() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('floorpage').style.display = 'block';
  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  loadTableStatuses(`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`);
}

function showLanding() {
  document.getElementById('floorpage').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
}

function onTableClick(el) {
  if (el.classList.contains('booked')) return;
  state.tableId = el.dataset.id;
  state.tableName = el.dataset.name;
  state.tableSeats = parseInt(el.dataset.seats);
  state.guests = Math.min(2, state.tableSeats);
  document.getElementById('modal-title').textContent = state.tableName;
  document.getElementById('modal-sub').textContent = state.tableSeats + ' місць';
  document.getElementById('g-val').textContent = state.guests;
  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const di = document.getElementById('pick-date');
  di.min = todayStr; di.value = todayStr;
  state.date = todayStr;
  loadTimeSlots(todayStr, state.tableName);
  document.getElementById('f-name').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('modal').classList.add('open');
}

async function loadTimeSlots(date, tableName) {
  let taken = [];
  try {
    const res = await fetch(`${API_BASE}/api/slots?date=${date}&table=${encodeURIComponent(tableName)}`);
    if (res.ok) { const d = await res.json(); taken = d.taken || []; }
  } catch(e) {}
  buildTimes(taken);
}

document.getElementById('pick-date').addEventListener('change', e => {
  state.date = e.target.value;
  state.time = '';
  loadTimeSlots(state.date, state.tableName);
  checkForm();
});

function buildTimes(taken) {
  const grid = document.getElementById('time-grid');
  grid.innerHTML = '';
  TIMES.forEach(t => {
    const b = document.createElement('button');
    b.className = 'time-btn' + (taken.includes(t) ? ' taken' : '');
    b.textContent = t;
    if (!taken.includes(t)) b.onclick = () => selectTime(t, b);
    grid.appendChild(b);
  });
  state.time = '';
}

function selectTime(t, el) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  state.time = t;
  checkForm();
}

function changeGuests(d) {
  state.guests = Math.max(1, Math.min(state.tableSeats, state.guests + d));
  document.getElementById('g-val').textContent = state.guests;
}

function checkForm() {
  const ok = state.time && state.date &&
    document.getElementById('f-name').value.trim() &&
    document.getElementById('f-phone').value.trim();
  document.getElementById('btn-confirm').disabled = !ok;
}

function submitBooking() {
  const name = document.getElementById('f-name').value.trim();
  const phone = selectedCountry.code + ' ' + document.getElementById('f-phone').value.trim();
  const note = document.getElementById('f-note').value.trim();
  const data = { tableId: state.tableId, tableName: state.tableName, tableSeats: state.tableSeats, date: state.date, time: state.time, guests: state.guests, name, phone, note };
  if (tg) tg.sendData(JSON.stringify(data));
  showSuccess(data);
}

function showSuccess(data) {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('floorpage').style.display = 'none';
  document.getElementById('landing').style.display = 'none';
  const dateStr = new Date(data.date).toLocaleDateString('uk-UA', { day:'numeric', month:'long' });
  document.getElementById('success-details').innerHTML = `
    <div class="success-detail"><span>Столик</span><span>${data.tableName}</span></div>
    <div class="success-detail"><span>Дата</span><span>${dateStr}</span></div>
    <div class="success-detail"><span>Час</span><span>${data.time}</span></div>
    <div class="success-detail"><span>Гостей</span><span>${data.guests}</span></div>
    <div class="success-detail"><span>Ім'я</span><span>${data.name}</span></div>
    <div class="success-detail"><span>Телефон</span><span>${data.phone}</span></div>
  `;
  document.getElementById('successpage').classList.add('open');
}
</script>

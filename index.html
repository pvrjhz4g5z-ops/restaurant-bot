<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Бронювання</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0c;
  --bg2: #141414;
  --text: #f0ede8;
  --text2: #888;
  --accent: #c9a96e;
  --free-fill: #1a1a1a;
  --free-border: #3a3a3a;
  --booked-fill: #111;
  --booked-border: #222;
  --radius: 14px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  overflow-x: hidden;
}

/* ── LANDING ── */
#landing {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

.landing-card {
  width: 100%;
  max-width: 360px;
  aspect-ratio: 3/4;
  background: var(--bg2);
  border: 1px solid #1e1e1e;
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 40px 32px;
  position: relative;
  overflow: hidden;
}

.landing-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(201,169,110,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.landing-logo {
  position: absolute;
  top: 40px;
  left: 0; right: 0;
  text-align: center;
}

.landing-logo-mark {
  width: 40px;
  height: 1px;
  background: var(--accent);
  margin: 0 auto 20px;
}

.landing-name {
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 400;
}

.landing-tagline {
  font-size: 28px;
  font-weight: 300;
  letter-spacing: -0.02em;
  color: var(--text);
  text-align: center;
  line-height: 1.25;
  margin-bottom: 36px;
}

.btn-book {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: #0c0c0c;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-book:active { opacity: 0.8; }

/* ── FLOOR PLAN ── */
#floorpage {
  display: none;
  min-height: 100vh;
  background: var(--bg);
}

.floor-header {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.back-btn {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  padding: 8px 0;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.floor-title {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text2);
}

.floor-wrap {
  padding: 16px;
}

.floor-svg {
  width: 100%;
  height: auto;
  display: block;
}

/* TABLE STYLES in SVG via class */
.tbl-free { cursor: pointer; }
.tbl-free .tbl-body { fill: var(--free-fill); stroke: #2e2e2e; stroke-width: 1; transition: fill 0.15s; }
.tbl-free:active .tbl-body { fill: #252525; }
.tbl-free .tbl-label { fill: var(--text); font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase; }
.tbl-free .tbl-sub { fill: var(--accent); font-size: 8px; }

.tbl-booked .tbl-body { fill: #0f0f0f; stroke: #1a1a1a; stroke-width: 1; }
.tbl-booked .tbl-label { fill: #333; font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase; }
.tbl-booked .tbl-sub { fill: #2a2a2a; font-size: 8px; }

/* ── BOOKING MODAL ── */
#modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  align-items: flex-end;
  justify-content: center;
}
#modal.open { display: flex; }

.modal-sheet {
  width: 100%;
  max-width: 480px;
  background: var(--bg2);
  border-radius: 24px 24px 0 0;
  padding: 12px 24px 40px;
  border-top: 1px solid #1e1e1e;
}

.modal-handle {
  width: 36px; height: 4px;
  background: #2a2a2a;
  border-radius: 2px;
  margin: 0 auto 24px;
}

.modal-title {
  font-size: 17px;
  font-weight: 500;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

.modal-sub {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 24px;
}

.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 8px;
}
.field input {
  width: 100%;
  padding: 13px 14px;
  background: #111;
  border: 1px solid #222;
  border-radius: 10px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--accent); }

.time-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.time-btn {
  padding: 10px 4px;
  text-align: center;
  font-size: 12px;
  background: #111;
  border: 1px solid #222;
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
}
.time-btn.sel {
  background: rgba(201,169,110,0.12);
  border-color: var(--accent);
  color: var(--accent);
}
.time-btn.taken {
  opacity: 0.2;
  cursor: not-allowed;
  text-decoration: line-through;
}

.guests-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.guests-row label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text2);
  flex: 1;
}
.g-btn {
  width: 32px; height: 32px;
  background: #111; border: 1px solid #222;
  border-radius: 50%; color: var(--text);
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.g-val { font-size: 16px; font-weight: 500; min-width: 20px; text-align: center; }

.divider {
  height: 1px;
  background: #1a1a1a;
  margin: 20px 0;
}

.btn-confirm {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: #0c0c0c;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-confirm:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-confirm:active:not(:disabled) { opacity: 0.8; }

/* ── SUCCESS ── */
#successpage {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
#successpage.open { display: flex; }

.success-card {
  text-align: center;
  max-width: 300px;
}
.success-line {
  width: 1px; height: 60px;
  background: var(--accent);
  margin: 0 auto 32px;
}
.success-title {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.success-sub {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 40px;
}
.success-detail {
  font-size: 12px;
  color: var(--text2);
  letter-spacing: 0.05em;
  padding: 6px 0;
  border-bottom: 1px solid #1a1a1a;
  display: flex;
  justify-content: space-between;
}
.success-detail span:last-child { color: var(--text); }
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="landing-card">
    <div class="landing-logo">
      <div class="landing-logo-mark"></div>
      <div class="landing-name">Ресторан</div>
    </div>
    <div class="landing-tagline">Забронюйте<br>свій столик</div>
    <button class="btn-book" onclick="showFloor()">Забронювати</button>
  </div>
</div>

<!-- FLOOR PLAN -->
<div id="floorpage">
  <div class="floor-header">
    <button class="back-btn" onclick="showLanding()">← Назад</button>
    <span class="floor-title">Оберіть столик</span>
    <span style="width:60px"></span>
  </div>
  <div class="floor-wrap">
    <svg class="floor-svg" viewBox="0 0 340 520" xmlns="http://www.w3.org/2000/svg">

      <!-- Room outline -->
      <rect x="8" y="8" width="324" height="504" rx="12" fill="none" stroke="#1c1c1c" stroke-width="1"/>

      <!-- Entrance indicator -->
      <rect x="130" y="500" width="80" height="8" rx="4" fill="#1a1a1a"/>
      <text x="170" y="507" text-anchor="middle" font-size="7" fill="#333" letter-spacing="0.1em">ВХІД</text>

      <!-- ── BAR AREA ── -->
      <rect x="18" y="18" width="304" height="72" rx="8" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
      <text x="90" y="48" text-anchor="middle" font-size="8" fill="#444" letter-spacing="0.15em">БАР</text>

      <!-- Bar stools (5) -->
      <circle cx="130" cy="52" r="10" fill="#151515" stroke="#252525" stroke-width="1"/>
      <text x="130" y="56" text-anchor="middle" font-size="7" fill="#444">①</text>

      <circle cx="158" cy="52" r="10" fill="#151515" stroke="#252525" stroke-width="1"/>
      <text x="158" y="56" text-anchor="middle" font-size="7" fill="#444">②</text>

      <circle cx="186" cy="52" r="10" fill="#151515" stroke="#252525" stroke-width="1"/>
      <text x="186" y="56" text-anchor="middle" font-size="7" fill="#444">③</text>

      <circle cx="214" cy="52" r="10" fill="#151515" stroke="#252525" stroke-width="1"/>
      <text x="214" y="56" text-anchor="middle" font-size="7" fill="#444">④</text>

      <circle cx="242" cy="52" r="10" fill="#151515" stroke="#252525" stroke-width="1"/>
      <text x="242" y="56" text-anchor="middle" font-size="7" fill="#444">⑤</text>

      <!-- ── ROW 1: window tables (2p each) ── -->
      <!-- T1 -->
      <g class="tbl-free" data-id="1" data-name="Стіл 1" data-seats="2" onclick="openModal(this)">
        <rect class="tbl-body" x="20" y="112" width="68" height="68" rx="6"/>
        <text class="tbl-label" x="54" y="144" text-anchor="middle">Стіл 1</text>
        <text class="tbl-sub" x="54" y="157" text-anchor="middle">Забронювати</text>
      </g>
      <!-- T2 -->
      <g class="tbl-free" data-id="2" data-name="Стіл 2" data-seats="2" onclick="openModal(this)">
        <rect class="tbl-body" x="136" y="112" width="68" height="68" rx="6"/>
        <text class="tbl-label" x="170" y="144" text-anchor="middle">Стіл 2</text>
        <text class="tbl-sub" x="170" y="157" text-anchor="middle">Забронювати</text>
      </g>
      <!-- T3 booked -->
      <g class="tbl-booked" data-id="3" data-name="Стіл 3" data-seats="2">
        <rect class="tbl-body" x="252" y="112" width="68" height="68" rx="6"/>
        <text class="tbl-label" x="286" y="144" text-anchor="middle">Стіл 3</text>
        <text class="tbl-sub" x="286" y="157" text-anchor="middle">Заброньовано</text>
      </g>

      <!-- ── ROW 2 ── -->
      <!-- T4 -->
      <g class="tbl-free" data-id="4" data-name="Стіл 4" data-seats="4" onclick="openModal(this)">
        <rect class="tbl-body" x="20" y="214" width="68" height="68" rx="6"/>
        <text class="tbl-label" x="54" y="246" text-anchor="middle">Стіл 4</text>
        <text class="tbl-sub" x="54" y="259" text-anchor="middle">Забронювати</text>
      </g>
      <!-- T5 booked -->
      <g class="tbl-booked" data-id="5" data-name="Стіл 5" data-seats="4">
        <rect class="tbl-body" x="136" y="214" width="68" height="68" rx="6"/>
        <text class="tbl-label" x="170" y="246" text-anchor="middle">Стіл 5</text>
        <text class="tbl-sub" x="170" y="259" text-anchor="middle">Заброньовано</text>
      </g>
      <!-- T6 -->
      <g class="tbl-free" data-id="6" data-name="Стіл 6" data-seats="4" onclick="openModal(this)">
        <rect class="tbl-body" x="252" y="214" width="68" height="68" rx="6"/>
        <text class="tbl-label" x="286" y="246" text-anchor="middle">Стіл 6</text>
        <text class="tbl-sub" x="286" y="259" text-anchor="middle">Забронювати</text>
      </g>

      <!-- ── ROW 3 ── -->
      <!-- T7 -->
      <g class="tbl-free" data-id="7" data-name="Стіл 7" data-seats="2" onclick="openModal(this)">
        <rect class="tbl-body" x="20" y="316" width="68" height="68" rx="6"/>
        <text class="tbl-label" x="54" y="348" text-anchor="middle">Стіл 7</text>
        <text class="tbl-sub" x="54" y="361" text-anchor="middle">Забронювати</text>
      </g>
      <!-- T8 -->
      <g class="tbl-free" data-id="8" data-name="Стіл 8" data-seats="4" onclick="openModal(this)">
        <rect class="tbl-body" x="136" y="316" width="68" height="68" rx="6"/>
        <text class="tbl-label" x="170" y="348" text-anchor="middle">Стіл 8</text>
        <text class="tbl-sub" x="170" y="361" text-anchor="middle">Забронювати</text>
      </g>
      <!-- T9 booked -->
      <g class="tbl-booked" data-id="9" data-name="Стіл 9" data-seats="2">
        <rect class="tbl-body" x="252" y="316" width="68" height="68" rx="6"/>
        <text class="tbl-label" x="286" y="348" text-anchor="middle">Стіл 9</text>
        <text class="tbl-sub" x="286" y="361" text-anchor="middle">Заброньовано</text>
      </g>

      <!-- ── ROW 4: large table ── -->
      <!-- T10 VIP -->
      <g class="tbl-free" data-id="10" data-name="VIP-стіл" data-seats="6" onclick="openModal(this)">
        <rect class="tbl-body" x="20" y="418" width="300" height="68" rx="6"/>
        <text class="tbl-label" x="170" y="450" text-anchor="middle">VIP-стіл</text>
        <text class="tbl-sub" x="170" y="463" text-anchor="middle">Забронювати · 6 місць</text>
      </g>

    </svg>
  </div>
</div>

<!-- BOOKING MODAL -->
<div id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Стіл</div>
    <div class="modal-sub" id="modal-sub">2 місця</div>

    <div class="field">
      <label>Дата</label>
      <input type="date" id="pick-date">
    </div>

    <div class="guests-row">
      <label>Гостей</label>
      <button class="g-btn" onclick="changeGuests(-1)">−</button>
      <span class="g-val" id="g-val">2</span>
      <button class="g-btn" onclick="changeGuests(1)">+</button>
    </div>

    <div class="time-grid" id="time-grid"></div>
    <div class="divider"></div>

    <div class="field">
      <label>Ім'я</label>
      <input type="text" id="f-name" placeholder="Ваше ім'я" oninput="checkForm()">
    </div>
    <div class="field">
      <label>Телефон</label>
      <input type="tel" id="f-phone" value="+380" placeholder="+380 XX XXX XX XX" oninput="checkForm()">
    </div>
    <div class="field">
      <label>Побажання</label>
      <input type="text" id="f-note" placeholder="Необов'язково">
    </div>

    <button class="btn-confirm" id="btn-confirm" onclick="submitBooking()" disabled>Підтвердити</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="successpage">
  <div class="success-card">
    <div class="success-line"></div>
    <div class="success-title">Бронювання<br>прийнято</div>
    <div class="success-sub">Очікуйте підтвердження<br>від ресторану</div>
    <div id="success-details"></div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0c0c0c'); tg.setBackgroundColor('#0c0c0c'); }

const TIMES = ['12:00','12:30','13:00','13:30','14:00','14:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30'];
const state = { tableId: null, tableName: '', tableSeats: 0, date: '', time: '', guests: 2 };

function showFloor() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('floorpage').style.display = 'block';
}

function showLanding() {
  document.getElementById('floorpage').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
}

function openModal(el) {
  state.tableId = el.dataset.id;
  state.tableName = el.dataset.name;
  state.tableSeats = parseInt(el.dataset.seats);
  state.guests = Math.min(2, state.tableSeats);

  document.getElementById('modal-title').textContent = state.tableName;
  document.getElementById('modal-sub').textContent = state.tableSeats + ' місць';
  document.getElementById('g-val').textContent = state.guests;

  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const di = document.getElementById('pick-date');
  di.min = todayStr;
  di.value = todayStr;
  state.date = todayStr;

  buildTimes([]);
  document.getElementById('f-name').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('modal').classList.add('open');
}

document.getElementById('pick-date').addEventListener('change', e => {
  state.date = e.target.value;
  state.time = '';
  buildTimes([]);
  checkForm();
});

function buildTimes(taken) {
  const grid = document.getElementById('time-grid');
  grid.innerHTML = '';
  TIMES.forEach(t => {
    const b = document.createElement('button');
    b.className = 'time-btn' + (taken.includes(t) ? ' taken' : '');
    b.textContent = t;
    if (!taken.includes(t)) b.onclick = () => selectTime(t, b);
    grid.appendChild(b);
  });
  state.time = '';
}

function selectTime(t, el) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  state.time = t;
  checkForm();
}

function changeGuests(d) {
  state.guests = Math.max(1, Math.min(state.tableSeats, state.guests + d));
  document.getElementById('g-val').textContent = state.guests;
}

function checkForm() {
  const ok = state.time && state.date &&
    document.getElementById('f-name').value.trim() &&
    document.getElementById('f-phone').value.trim();
  document.getElementById('btn-confirm').disabled = !ok;
}

function submitBooking() {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const note = document.getElementById('f-note').value.trim();

  const data = {
    tableId: state.tableId,
    tableName: state.tableName,
    tableSeats: state.tableSeats,
    date: state.date,
    time: state.time,
    guests: state.guests,
    name, phone, note
  };

  if (tg) {
    tg.sendData(JSON.stringify(data));
  }

  showSuccess(data);
}

function showSuccess(data) {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('floorpage').style.display = 'none';
  document.getElementById('landing').style.display = 'none';

  const dateStr = new Date(data.date).toLocaleDateString('uk-UA', { day:'numeric', month:'long' });
  document.getElementById('success-details').innerHTML = `
    <div class="success-detail"><span>Столик</span><span>${data.tableName}</span></div>
    <div class="success-detail"><span>Дата</span><span>${dateStr}</span></div>
    <div class="success-detail"><span>Час</span><span>${data.time}</span></div>
    <div class="success-detail"><span>Гостей</span><span>${data.guests}</span></div>
    <div class="success-detail"><span>Ім'я</span><span>${data.name}</span></div>
  `;
  document.getElementById('successpage').classList.add('open');
}

// Close modal on backdrop click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
});
</script>
</body>
</html>
